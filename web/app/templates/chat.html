{% extends "base.html" %}
{% set active_page = "chat" %}
{% block title %}Chat{% endblock %}

{% block content %}
<div class="flex flex-col h-full" id="chat-root">

  <!-- Message history -->
  <div class="flex-1 overflow-y-auto px-6 py-6 space-y-6" id="messages">
    {% for msg in initial_messages %}
      {% if msg.role == "user" %}
      <div class="flex justify-end">
        <div class="bg-gray-100 rounded-2xl px-4 py-2.5 text-sm text-gray-800 max-w-[80%] whitespace-pre-wrap">{{ msg.content }}</div>
      </div>
      {% else %}
      <div class="flex flex-col gap-1 max-w-[85%]">
        <span class="text-xs font-medium text-gray-400">Alfred</span>
        <div class="text-sm text-gray-800 whitespace-pre-wrap leading-relaxed">{{ msg.content }}</div>
      </div>
      {% endif %}
    {% endfor %}
  </div>

  <!-- Input bar -->
  <div class="border-t border-gray-200 p-4 bg-white">
    <form id="chat-form" class="flex gap-2">
      <input
        id="chat-input"
        type="text"
        placeholder="Message Alfred…"
        class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#378ADD] bg-white disabled:bg-gray-50 disabled:text-gray-400"
        autocomplete="off"
      />
      <button type="submit" class="btn btn-sm btn-primary" id="send-btn">Send</button>
    </form>
    <div id="chat-status" class="text-xs text-gray-400 mt-1"></div>
  </div>
</div>

<script>
const BACKEND_URL = {{ backend_url | tojson }};
const API_TOKEN  = {{ api_token | tojson }};

let streaming = false;

const messagesEl = document.getElementById("messages");
messagesEl.scrollTop = messagesEl.scrollHeight;

const inputEl  = document.getElementById("chat-input");
const sendBtn  = document.getElementById("send-btn");
const statusEl = document.getElementById("chat-status");
const formEl   = document.getElementById("chat-form");

function appendUserMessage(text) {
  const wrapper = document.createElement("div");
  wrapper.className = "flex justify-end";
  const bubble = document.createElement("div");
  bubble.className = "bg-gray-100 rounded-2xl px-4 py-2.5 text-sm text-gray-800 max-w-[80%] whitespace-pre-wrap";
  bubble.textContent = text;
  wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendAssistantMessage() {
  const wrapper = document.createElement("div");
  wrapper.className = "flex flex-col gap-1 max-w-[85%]";
  const label = document.createElement("span");
  label.className = "text-xs font-medium text-gray-400";
  label.textContent = "Alfred";
  const text = document.createElement("div");
  text.className = "text-sm text-gray-800 whitespace-pre-wrap leading-relaxed";
  wrapper.appendChild(label);
  wrapper.appendChild(text);
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return text;
}

formEl.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (streaming) return;

  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";
  inputEl.disabled = true;
  sendBtn.disabled = true;
  streaming = true;
  statusEl.textContent = "Alfred is thinking…";

  appendUserMessage(text);

  const formData = new FormData();
  formData.set("message", text);
  const msgResp = await fetch("/chat/message", { method: "POST", body: formData });
  if (!msgResp.ok) {
    appendAssistantMessage().textContent = "Error sending message.";
    streaming = false;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    statusEl.textContent = "";
    return;
  }
  const { session_id: sessionId } = await msgResp.json();

  const textEl = appendAssistantMessage();
  const url = `${BACKEND_URL}/core/chats/stream?session_id=${sessionId}&token=${API_TOKEN}`;

  try {
    const resp = await fetch(url, { headers: { "Accept": "text/event-stream" } });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6).trim();
        if (payload === "[DONE]") break;
        try {
          const parsed = JSON.parse(payload);
          if (parsed.chunk) {
            textEl.textContent += parsed.chunk;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
          if (parsed.error) {
            textEl.textContent = "Error: " + parsed.error;
            textEl.classList.add("text-red-500");
          }
        } catch (_) {}
      }
    }
  } catch (_) {
    textEl.textContent = "Connection error.";
    textEl.classList.add("text-red-500");
  }

  streaming = false;
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
  statusEl.textContent = "";
});
</script>
{% endblock %}
