  frequency_rank: 30
- type: collocation
  text: at the expense of
  translation: by sacrificing or causing harm to something else
  example: She pursued her career at the expense of her personal life.
  example_translation: Ela perseguiu sua carreira à custa de sua vida pessoal.
  cefr_level: C1
  frequency_rank: 31
- type: collocation
  text: shed light on
  translation: to help explain or clarify something
  example: New evidence has shed light on the cause of the accident.
  example_translation: Novas evidências esclareceram a causa do acidente.
  cefr_level: C1
  frequency_rank: 32
- type: collocation
  text: take precedence over
  translation: to be more important than something else; to come first
  example: Safety concerns must take precedence over cost savings.
  example_translation: As preocupações com segurança devem ter precedência sobre a economia de custos.
  cefr_level: C1
  frequency_rank: 33
- type: collocation
  text: give rise to
  translation: to cause or produce something, often a problem
  example: The policy changes gave rise to widespread protests.
