  cefr_level: C1
  frequency_rank: 16
- type: word
  text: tenacious
  translation: very determined; refusing to give up or let go
  example: She was a tenacious negotiator who never backed down.
  example_translation: Ela era uma negociadora tenaz que nunca recuava.
  cefr_level: C1
  frequency_rank: 17
- type: word
  text: undermine
  translation: to weaken or damage something gradually and secretly
  example: Constant criticism can undermine a person's confidence.
