  cefr_level: C1
  frequency_rank: 21
- type: word
  text: benevolent
  translation: well meaning and kindly; generous
  example: The benevolent founder donated his entire fortune to charity.
  example_translation: O fundador benevolente doou toda a sua fortuna a instituições de caridade.
  cefr_level: C1
  frequency_rank: 22
- type: word
  text: coherent
  translation: logical and consistent; easy to understand
  example: The argument was coherent and well-supported by evidence.
  example_translation: O argumento era coerente e bem sustentado por evidências.
  cefr_level: C1
  frequency_rank: 23
- type: word
  text: disparity
  translation: a great difference or inequality between things
  example: The disparity in income between the two regions is striking.
