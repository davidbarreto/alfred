name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch:

concurrency:
  group: deploy-alfred
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: web/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[test]"
        working-directory: web

      - name: Run tests
        run: python -m pytest tests/ -q
        working-directory: web

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          command_timeout: 60m
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR=/opt/stacks/alfred
            COMPOSE="docker compose -f $APP_DIR/infra/docker-compose.yml"

            echo "==> Pulling latest code..."
            if git -C "$APP_DIR" remote get-url origin &>/dev/null; then
              git -C "$APP_DIR" pull origin main
            else
              git -C "$APP_DIR" init -b main
              git -C "$APP_DIR" remote add origin "https://github.com/davidbarreto/alfred.git" 2>/dev/null \
                || git -C "$APP_DIR" remote set-url origin "https://github.com/davidbarreto/alfred.git"
              git -C "$APP_DIR" fetch origin main
              git -C "$APP_DIR" reset --hard origin/main
            fi

            echo "==> Building web..."
            $COMPOSE build web

            echo "==> Restarting web..."
            $COMPOSE up -d web
