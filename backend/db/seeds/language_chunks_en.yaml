# Vocabulary seed for en. Hand-crafted C1 entries.
# seed_language_chunks.py loads this on startup (idempotent).
en:
- type: word
  text: albeit
  translation: although; even though (formal/literary)
  example: The plan was ambitious, albeit risky.
  example_translation: O plano era ambicioso, embora arriscado.
  cefr_level: C1
  frequency_rank: 1
- type: word
  text: conjecture
  translation: opinion or conclusion based on incomplete information; speculation
  example: At that stage it was pure conjecture.
  example_translation: Nessa fase era pura especulação.
  cefr_level: C1
  frequency_rank: 2
- type: word
  text: discern
  translation: to perceive or recognise (something subtle or not immediately obvious)
  example: She could discern a hint of sarcasm in his tone.
  example_translation: Ela conseguia perceber uma pitada de sarcasmo no tom dele.
  cefr_level: C1
  frequency_rank: 3
- type: word
  text: eloquent
  translation: fluent and persuasive in speech or writing
  example: He gave an eloquent speech at the ceremony.
  example_translation: Ele fez um discurso eloquente na cerimônia.
  cefr_level: C1
  frequency_rank: 4
- type: word
  text: feasible
  translation: possible and practical to achieve
  example: Is it feasible to complete this by Friday?
  example_translation: É viável terminar isso até sexta-feira?
  cefr_level: C1
  frequency_rank: 5
- type: word
  text: hitherto
  translation: until now; until this point in time (formal)
  example: This was a hitherto unknown species of insect.
  example_translation: Era uma espécie de inseto até então desconhecida.
  cefr_level: C1
  frequency_rank: 6
- type: word
  text: implausible
  translation: not seeming reasonable or probable
  example: The alibi seemed highly implausible to the detective.
  example_translation: O álibi parecia muito implausível para o detetive.
  cefr_level: C1
  frequency_rank: 7
- type: word
  text: juxtapose
  translation: to place two things together in order to highlight their contrast
  example: The exhibition juxtaposes traditional and modern art.
  example_translation: A exposição coloca em contraste a arte tradicional e a moderna.
  cefr_level: C1
  frequency_rank: 8
- type: word
  text: lucid
  translation: clear and easy to understand; mentally alert
  example: Despite his age, he remained lucid and articulate.
  example_translation: Apesar da idade, ele permanecia lúcido e articulado.
  cefr_level: C1
  frequency_rank: 9
- type: word
  text: mundane
  translation: lacking interest or excitement; ordinary
  example: She found the mundane tasks of office life tedious.
  example_translation: Ela achava as tarefas mundanas da vida de escritório entediantes.
  cefr_level: C1
  frequency_rank: 10
- type: word
  text: nuance
  translation: a subtle difference in meaning, expression, or sound
  example: The translator had to capture every nuance of the original text.
  example_translation: O tradutor teve de capturar cada nuance do texto original.
  cefr_level: C1
  frequency_rank: 11
- type: word
  text: oblivious
  translation: not aware of or concerned about what is happening around one
  example: He was completely oblivious to the tension in the room.
  example_translation: Ele era completamente alheio à tensão na sala.
  cefr_level: C1
  frequency_rank: 12
- type: word
  text: paramount
  translation: more important than anything else; supreme
  example: Safety is of paramount importance on a construction site.
  example_translation: A segurança é de suma importância num canteiro de obras.
  cefr_level: C1
  frequency_rank: 13
- type: word
  text: reconcile
  translation: to make two opposing things consistent; to restore a friendly relationship
  example: It was hard to reconcile his words with his actions.
  example_translation: Era difícil conciliar suas palavras com suas ações.
  cefr_level: C1
  frequency_rank: 14
- type: word
  text: rhetoric
  translation: persuasive language; language that sounds impressive but lacks substance
  example: The politician's rhetoric failed to convince the voters.
  example_translation: A retórica do político não conseguiu convencer os eleitores.
  cefr_level: C1
  frequency_rank: 15
- type: word
  text: scrutinize
  translation: to examine or inspect closely and thoroughly
  example: The committee will scrutinize every detail of the proposal.
