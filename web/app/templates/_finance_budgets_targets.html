{% if categories %}
<div class="divide-y divide-gray-100">
  {% for cat in categories %}
  <div class="flex items-center justify-between py-2 text-sm gap-3">
    <span class="text-gray-800">{{ cat.name }}</span>
    <div class="flex items-center gap-1">
      <span class="text-gray-400 text-xs">{{ currency_symbol }}</span>
      <input
        type="number" step="0.01" min="0"
        data-category-id="{{ cat.id }}"
        class="budget-target-input border border-gray-200 rounded-lg px-2 py-1 text-sm w-28 text-right focus:outline-none focus:ring-1 focus:ring-[#378ADD]"
        placeholder="No limit"
        value="{{ targets_by_category.get(cat.id, '') }}"
      />
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<p class="text-sm text-gray-400 py-3 text-center">No categories yet.</p>
{% endif %}
