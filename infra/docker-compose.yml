services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_ADMIN_USER}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      N8N_DB_USER: ${N8N_DB_USER}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_DB_NAME: ${N8N_DB_NAME}
    volumes:
      - ${DB_DATA_DIR}:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ../backend
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
      - ${AUDIO_DATA_DIR}:/data/audio
    environment:
      - ENV=${ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - BACKEND_HOST=${BACKEND_HOST}
      - BACKEND_PORT=${BACKEND_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_ADMIN_URL=${DATABASE_ADMIN_URL}
      - ALFRED_API_TOKEN=${ALFRED_API_TOKEN}
      - VECTOR_EXTENSION=${VECTOR_EXTENSION}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_BASE_URL=${NOTION_BASE_URL}
      - NOTION_API_VERSION=${NOTION_API_VERSION}
      - NOTION_TASKS_DATABASE_ID=${NOTION_TASKS_DATABASE_ID}
      - NOTION_NOTES_DATABASE_ID=${NOTION_NOTES_DATABASE_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALENDAR_OAUTH_REDIRECT_URI=${GOOGLE_CALENDAR_OAUTH_REDIRECT_URI}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - GOOGLE_CONTACTS_OAUTH_REDIRECT_URI=${GOOGLE_CONTACTS_OAUTH_REDIRECT_URI}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - LLM_CHAT_MODEL=${LLM_CHAT_MODEL}
      - LLM_EXTRACTION_MODEL=${LLM_EXTRACTION_MODEL}
      - LLM_PRONUNCIATION_MODEL=${LLM_PRONUNCIATION_MODEL}
      - INTENT_THRESHOLD=${INTENT_THRESHOLD}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - AUDIO_STORAGE_DIR=${AUDIO_STORAGE_DIR}

  web:
    build: ../web
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:8080"
    depends_on:
      - api
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://api:8000
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL}
      - ALFRED_API_TOKEN=${ALFRED_API_TOKEN}
      - WEB_PORT=8080
      - WEB_PASSWORD=${WEB_PASSWORD}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "127.0.0.1:${N8N_PORT}:5678"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - NODE_ENV=${NODE_ENV}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST}
      - DB_POSTGRESDB_PORT=${N8N_DB_PORT}
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME}
      - DB_POSTGRESDB_USER=${N8N_DB_USER}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
    volumes:
      - ${N8N_DATA_DIR}:/home/node/.n8n