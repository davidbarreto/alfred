  cefr_level: C1
  frequency_rank: 34
- type: collocation
  text: fall short of
  translation: to fail to reach a required level or standard
  example: The results fell short of expectations.
  example_translation: Os resultados ficaram aquém das expectativas.
  cefr_level: C1
  frequency_rank: 35
- type: collocation
  text: in the wake of
  translation: after and as a result of a significant event
  example: In the wake of the scandal, several officials resigned.
  example_translation: Na esteira do escândalo, vários funcionários renunciaram.
  cefr_level: C1
  frequency_rank: 36
- type: collocation
  text: run counter to
  translation: to contradict or be opposed to something
  example: This decision runs counter to everything we stand for.
