<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Alfred{% endblock %} — Alfred Portal</title>

  <!-- Tabler icons webfont (outline, stroke-1.5) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
  <!-- DaisyUI 4 component structure -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <!-- Tailwind CDN with custom semantic colors -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#FAFAF9',
            sidebar: '#F5F4F0',
            accent:  { DEFAULT: '#378ADD', light: '#E6F1FB', dark: '#0C447C' },
            danger:  { DEFAULT: '#E24B4A', light: '#FCEBEB' },
            warn:    { DEFAULT: '#BA7517', light: '#FAEEDA' },
            ok:      { DEFAULT: '#639922', light: '#EAF3DE' },
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>

  <style>
    /*
     * DaisyUI 4 uses oklch variables in the format "L% C H" (no function wrapper).
     * Override :root so all DaisyUI components pick up our neutral palette.
     */
    :root {
      --b1:  100% 0 0;          /* white — card/input surfaces */
      --b2:  98.2% 0.002 90;    /* #FAFAF9 — page background */
      --b3:  96.1% 0.004 80;    /* #F5F4F0 — sidebar / muted areas */
      --bc:  15% 0 0;           /* near-black — body text */
      --p:   58% 0.14 236;      /* #378ADD — accent blue (active/selected only) */
      --pc:  100% 0 0;          /* white text on blue */
      --s:   58% 0.14 236;
      --sc:  100% 0 0;
      --a:   58% 0.14 236;
      --ac:  100% 0 0;
      --n:   18% 0 0;           /* neutral dark */
      --nc:  100% 0 0;
      --in:  58% 0.14 236;      /* info = blue */
      --inc: 100% 0 0;
      --su:  59% 0.16 135;      /* success = #639922 green */
      --suc: 100% 0 0;
      --wa:  60% 0.15 65;       /* warning = #BA7517 amber */
      --wac: 100% 0 0;
      --er:  55% 0.2 27;        /* error = #E24B4A red */
      --erc: 100% 0 0;
      --rounded-box: 0.5rem;
      --rounded-btn: 0.375rem;
      --rounded-badge: 1rem;
      --border-btn: 1px;
    }

    /* Sidebar nav links */
    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.625rem;
      border-radius: 0.375rem;
      font-size: 0.8125rem;
      color: #4B5563;
      text-decoration: none;
      transition: background 0.1s, color 0.1s;
    }
    .nav-link:hover { background: #ECEAE4; color: #111827; }
    .nav-link.active { background: #E6F1FB; color: #0C447C; font-weight: 500; }
    .nav-link .ti { font-size: 1rem; width: 1.125rem; text-align: center; flex-shrink: 0; }

    /* Global card: thin border, no shadow */
    .card { box-shadow: none !important; border: 1px solid #E5E7EB; }
    /* Inputs: minimal ring */
    .input, .select, .textarea {
      border-color: #E5E7EB;
      background-color: #fff;
    }
    .input:focus, .select:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px #E6F1FB; }
  </style>
</head>
<body class="bg-[#FAFAF9] text-gray-900 antialiased">

  <!-- Mobile top bar -->
  <header class="md:hidden fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-4 bg-[#F5F4F0] border-b border-gray-200 h-12">
    <span class="text-sm font-semibold text-gray-900 tracking-tight">Alfred</span>
    <button id="sidebar-toggle" class="p-1.5 rounded hover:bg-[#ECEAE4] text-gray-600" aria-label="Open menu">
      <i class="ti ti-menu-2 text-xl leading-none"></i>
    </button>
  </header>

  <!-- Sidebar backdrop (mobile only) -->
  <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/30 z-20 md:hidden"></div>

  <div class="flex h-screen pt-12 md:pt-0">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static top-12 md:top-0 bottom-0 left-0 z-30 w-[200px] shrink-0 bg-[#F5F4F0] border-r border-gray-200 flex flex-col py-5 px-2 -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out overflow-y-auto">

      <div class="px-3 mb-5 hidden md:block">
        <span class="text-sm font-semibold text-gray-900 tracking-tight">Alfred</span>
      </div>

      <nav class="flex flex-col gap-0.5 flex-1">
        <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
          <i class="ti ti-layout-dashboard"></i>Dashboard
        </a>
        <a href="/tasks" class="nav-link {% if active_page == 'tasks' %}active{% endif %}">
          <i class="ti ti-checklist"></i>Tasks
        </a>
        <a href="/shopping" class="nav-link {% if active_page == 'shopping' %}active{% endif %}">
          <i class="ti ti-shopping-cart"></i>Shopping
        </a>
        <a href="/calendar" class="nav-link {% if active_page == 'calendar' %}active{% endif %}">
          <i class="ti ti-calendar"></i>Calendar
        </a>
        <a href="/notes" class="nav-link {% if active_page == 'notes' %}active{% endif %}">
          <i class="ti ti-notes"></i>Notes
        </a>
        <a href="/contacts" class="nav-link {% if active_page == 'contacts' %}active{% endif %}">
          <i class="ti ti-address-book"></i>Contacts
        </a>
        <a href="/finance" class="nav-link {% if active_page == 'finance' %}active{% endif %}">
          <i class="ti ti-wallet"></i>Finance
        </a>
        <a href="/insights" class="nav-link {% if active_page == 'insights' %}active{% endif %}">
          <i class="ti ti-chart-bar"></i>Insights
        </a>
        <a href="/languages" class="nav-link {% if active_page == 'languages' %}active{% endif %}">
          <i class="ti ti-language"></i>Languages
        </a>
        <a href="/briefing" class="nav-link {% if active_page == 'briefing' %}active{% endif %}">
          <i class="ti ti-sun"></i>Briefing
        </a>
        <a href="/monitoring" class="nav-link {% if active_page == 'monitoring' %}active{% endif %}">
          <i class="ti ti-radar-2"></i>Monitoring
        </a>
      </nav>

      <div class="border-t border-gray-200 pt-2 mt-auto space-y-0.5">
        <a href="/chat" class="nav-link {% if active_page == 'chat' %}active{% endif %}">
          <i class="ti ti-message-circle-2"></i>Chat
        </a>
        <a href="/logout" class="nav-link text-gray-400 hover:text-gray-600">
          <i class="ti ti-logout"></i>Sign out
        </a>
      </div>

    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto min-w-0">
      {% block content %}{% endblock %}
    </main>

  </div>

  <script>
    (function () {
      var toggle = document.getElementById('sidebar-toggle');
      var sidebar = document.getElementById('sidebar');
      var backdrop = document.getElementById('sidebar-backdrop');

      function openSidebar() {
        sidebar.classList.remove('-translate-x-full');
        backdrop.classList.remove('hidden');
      }

      function closeSidebar() {
        sidebar.classList.add('-translate-x-full');
        backdrop.classList.add('hidden');
      }

      toggle.addEventListener('click', function () {
        if (sidebar.classList.contains('-translate-x-full')) {
          openSidebar();
        } else {
          closeSidebar();
        }
      });

      backdrop.addEventListener('click', closeSidebar);
    })();
  </script>

</body>
</html>
