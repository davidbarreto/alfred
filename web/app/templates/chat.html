{% extends "base.html" %}
{% set active_page = "chat" %}
{% block title %}Chat{% endblock %}

{% block content %}
<div class="flex flex-col h-full" id="chat-root">

  <!-- Message history -->
  <div class="flex-1 overflow-y-auto p-6 space-y-4" id="messages">
    {% for msg in initial_messages %}
    <div class="chat {{ 'chat-end' if msg.role == 'user' else 'chat-start' }}">
      <div class="chat-header text-xs text-gray-400 mb-1">{{ "You" if msg.role == "user" else "Alfred" }}</div>
      <div class="chat-bubble {{ 'chat-bubble-neutral' if msg.role == 'user' else 'chat-bubble-primary' }} whitespace-pre-wrap text-sm">{{ msg.content }}</div>
    </div>
    {% endfor %}
  </div>

  <!-- Input bar -->
  <div class="border-t border-gray-200 p-4 bg-white">
    <form id="chat-form" class="flex gap-2">
      <input
        id="chat-input"
        type="text"
        placeholder="Message Alfred…"
        class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#378ADD] bg-white disabled:bg-gray-50 disabled:text-gray-400"
        autocomplete="off"
      />
      <button type="submit" class="btn btn-sm btn-primary" id="send-btn">Send</button>
    </form>
    <div id="chat-status" class="text-xs text-gray-400 mt-1"></div>
  </div>
</div>

<script>
const BACKEND_URL = {{ backend_url | tojson }};
const API_TOKEN  = {{ api_token | tojson }};

let streaming = false;

const messagesEl = document.getElementById("messages");

// Scroll to bottom to show the most recent messages
messagesEl.scrollTop = messagesEl.scrollHeight;
const inputEl    = document.getElementById("chat-input");
const sendBtn    = document.getElementById("send-btn");
const statusEl   = document.getElementById("chat-status");
const formEl     = document.getElementById("chat-form");

function appendMessage(role, text) {
  const div = document.createElement("div");
  div.className = role === "user" ? "chat chat-end" : "chat chat-start";
  div.innerHTML = `
    <div class="chat-header text-xs text-gray-400 mb-1">${role === "user" ? "You" : "Alfred"}</div>
    <div class="chat-bubble ${role === "user" ? "chat-bubble-neutral" : "chat-bubble-primary"} whitespace-pre-wrap text-sm"></div>
  `;
  div.querySelector(".chat-bubble").textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div.querySelector(".chat-bubble");
}

formEl.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (streaming) return;

  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";
  inputEl.disabled = true;
  sendBtn.disabled = true;
  streaming = true;
  statusEl.textContent = "Alfred is thinking…";

  appendMessage("user", text);

  // POST message server-side (keeps API token out of the browser)
  const formData = new FormData();
  formData.set("message", text);
  const msgResp = await fetch("/chat/message", { method: "POST", body: formData });
  if (!msgResp.ok) {
    appendMessage("assistant", "[Error sending message]");
    streaming = false;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    statusEl.textContent = "";
    return;
  }
  const { session_id: sessionId } = await msgResp.json();

  // Open SSE stream with the session_id returned by the ingest endpoint
  const bubble = appendMessage("assistant", "");
  const url = `${BACKEND_URL}/core/chats/stream?session_id=${sessionId}&token=${API_TOKEN}`;

  try {
    const resp = await fetch(url, {
      headers: { "Accept": "text/event-stream" },
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6).trim();
        if (payload === "[DONE]") break;
        try {
          const parsed = JSON.parse(payload);
          if (parsed.chunk) {
            bubble.textContent += parsed.chunk;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
          if (parsed.error) {
            bubble.textContent = "[Error: " + parsed.error + "]";
            bubble.classList.add("chat-bubble-error");
          }
        } catch (_) {}
      }
    }
  } catch (err) {
    bubble.textContent = "[Connection error]";
  }

  streaming = false;
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
  statusEl.textContent = "";
});
</script>
{% endblock %}
