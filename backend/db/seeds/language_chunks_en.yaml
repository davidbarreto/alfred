  frequency_rank: 18
- type: word
  text: viable
  translation: capable of working successfully; feasible
  example: Electric vehicles are now a viable alternative to petrol cars.
  example_translation: Os veículos elétricos são agora uma alternativa viável aos carros a gasolina.
  cefr_level: C1
  frequency_rank: 19
- type: word
  text: wary
  translation: feeling cautious about possible dangers or problems
  example: Be wary of anyone who promises instant results.
