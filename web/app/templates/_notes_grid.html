{% if notes %}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
  {% for note in notes %}
  <div
    class="bg-white border border-gray-200 rounded-lg hover:border-gray-300 transition-colors cursor-pointer"
    data-note="{{ note.title }} {{ note.content }}"
  >
    <div class="p-4 flex flex-col gap-1">
      {% if note.tags %}
      <span class="text-[10px] px-1.5 py-0.5 rounded bg-gray-100 text-gray-500 self-start mb-0.5">{{ note.tags[0] }}</span>
      {% endif %}
      <h3 class="text-sm font-medium text-gray-900 truncate">{{ note.title }}</h3>
      <p class="text-xs text-gray-400 line-clamp-2 mt-0.5">{{ note.content }}</p>
      <div class="text-[10px] text-gray-300 mt-2">
        {% if note.updated_at %}updated {{ note.updated_at | timeago }}{% endif %}
      </div>
    </div>
  </div>
  {% endfor %}
  <!-- New note placeholder -->
  <div class="border border-dashed border-gray-200 rounded-lg hover:border-[#378ADD]/40 transition-colors cursor-pointer min-h-[100px]">
    <div class="h-full flex flex-col items-center justify-center text-gray-300 hover:text-[#378ADD]/50 transition-colors p-4">
      <i class="ti ti-plus text-xl mb-1"></i>
      <span class="text-xs">New note</span>
    </div>
  </div>
</div>
{% else %}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
  <div class="border border-dashed border-gray-200 rounded-lg hover:border-[#378ADD]/40 transition-colors cursor-pointer min-h-[120px]">
    <div class="h-full flex flex-col items-center justify-center text-gray-300 hover:text-[#378ADD]/50 transition-colors p-4">
      <i class="ti ti-plus text-xl mb-1"></i>
      <span class="text-xs">New note</span>
    </div>
  </div>
</div>
{% endif %}
