include:
  - docker-compose.n8n.yml        # ← pulls in n8n service

services:
  api:
    build: ../backend
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    depends_on:
      - db
      - n8n                       # ← can reference n8n from included file
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: