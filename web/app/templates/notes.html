{% extends "base.html" %}
{% set active_page = "notes" %}
{% block title %}Notes{% endblock %}

{% block content %}
<div class="p-6 space-y-4">

  <div class="flex items-center justify-between">
    <h1 class="text-base font-semibold text-gray-900">Notes</h1>
    <button onclick="document.getElementById('new-note-modal').showModal()"
            class="btn btn-sm btn-primary gap-1">
      <i class="ti ti-plus text-sm"></i>New note
    </button>
  </div>

  <input
    id="notes-search"
    type="text"
    placeholder="Search notes…"
    class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-white w-full max-w-sm focus:outline-none focus:ring-1 focus:ring-[#378ADD]"
    oninput="filterNotes(this.value)"
  />

  <div id="notes-grid">
    {% include "_notes_grid.html" %}
  </div>
</div>

<!-- New Note Modal -->
<dialog id="new-note-modal" class="modal">
  <div class="modal-box bg-white rounded-xl border border-gray-200 shadow-lg max-w-md w-full p-6">
    <h3 id="note-form-title" class="text-sm font-semibold text-gray-900 mb-4">New note</h3>
    <form id="new-note-form" onsubmit="submitNewNote(event)" class="flex flex-col gap-3">
      <input name="note_id" type="hidden" value="" />
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Title <span class="text-[#E24B4A]">*</span></label>
        <input
          id="note-title"
          name="title"
          type="text"
          required
          placeholder="Note title"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white w-full focus:outline-none focus:ring-1 focus:ring-[#378ADD]"
        />
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Content</label>
        <textarea
          id="note-content"
          name="content"
          rows="4"
          placeholder="Write something…"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white w-full resize-none focus:outline-none focus:ring-1 focus:ring-[#378ADD]"
        ></textarea>
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Tags <span class="text-gray-300">(comma-separated)</span></label>
        <input
          id="note-tags"
          name="tags"
          type="text"
          placeholder="work, ideas, personal"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white w-full focus:outline-none focus:ring-1 focus:ring-[#378ADD]"
        />
      </div>
      <p id="note-error" class="text-xs text-[#E24B4A] hidden"></p>
      <div class="flex justify-end gap-2 mt-1">
        <button type="button" onclick="document.getElementById('new-note-modal').close()"
                class="btn btn-sm btn-ghost text-gray-500">Cancel</button>
        <button type="submit" id="note-submit-btn" class="btn btn-sm btn-primary">Save note</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

<!-- View Note Modal -->
<dialog id="view-note-modal" class="modal">
  <div class="modal-box bg-white rounded-xl border border-gray-200 shadow-lg max-w-lg w-full p-6">
    <div class="flex items-start justify-between gap-2 mb-1">
      <h3 id="view-note-title" class="text-sm font-semibold text-gray-900"></h3>
      <button onclick="document.getElementById('view-note-modal').close()"
              class="text-gray-300 hover:text-gray-500">
        <i class="ti ti-x text-sm"></i>
      </button>
    </div>
    <div id="view-note-tags" class="flex flex-wrap gap-1 mb-2"></div>
    <p id="view-note-content" class="text-sm text-gray-600 whitespace-pre-wrap break-words max-h-[60vh] overflow-y-auto"></p>
    <div id="view-note-updated" class="text-[10px] text-gray-300 mt-3"></div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

<script>
function openNoteView(id, title, content, tags, updatedAt) {
  document.getElementById("view-note-title").textContent = title;
  document.getElementById("view-note-content").textContent = content;

  const tagsEl = document.getElementById("view-note-tags");
  tagsEl.innerHTML = "";
  (tags || []).forEach(tag => {
    const span = document.createElement("span");
    span.className = "text-[10px] px-1.5 py-0.5 rounded bg-gray-100 text-gray-500";
    span.textContent = tag;
    tagsEl.appendChild(span);
  });

  const updatedEl = document.getElementById("view-note-updated");
  updatedEl.textContent = updatedAt ? `updated ${new Date(updatedAt).toLocaleString()}` : "";

  document.getElementById("view-note-modal").showModal();
}

function filterNotes(q) {
  q = q.toLowerCase();
  document.querySelectorAll("#notes-grid [data-note]").forEach(card => {
    const text = card.dataset.note.toLowerCase();
    card.style.display = text.includes(q) ? "" : "none";
  });
}

function openNewNote() {
  document.getElementById("note-error").classList.add("hidden");
  document.getElementById("new-note-form").reset();
  document.getElementById("note-form-title").textContent = "New note";
  document.getElementById("new-note-modal").showModal();
  setTimeout(() => document.getElementById("note-title").focus(), 50);
}

function openEditNote(note) {
  document.getElementById("note-error").classList.add("hidden");
  document.getElementById("new-note-form").reset();
  document.getElementById("note-form-title").textContent = "Edit note";
  const form = document.getElementById("new-note-form");
  form.querySelector('[name="note_id"]').value = note.id;
  form.querySelector('[name="title"]').value = note.title;
  form.querySelector('[name="content"]').value = note.content || "";
  form.querySelector('[name="tags"]').value = (note.tags || []).join(", ");
  document.getElementById("new-note-modal").showModal();
  setTimeout(() => document.getElementById("note-title").focus(), 50);
}

async function submitNewNote(e) {
  e.preventDefault();
  const btn = document.getElementById("note-submit-btn");
  const errEl = document.getElementById("note-error");
  btn.disabled = true;
  btn.textContent = "Saving…";
  errEl.classList.add("hidden");

  const body = new FormData(e.target);
  const noteId = body.get("note_id");
  const url = noteId ? `/notes/${noteId}` : "/notes/";
  const method = noteId ? "PATCH" : "POST";
  try {
    const res = await fetch(url, { method, body });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(txt || `Error ${res.status}`);
    }
    const html = await res.text();
    document.getElementById("notes-grid").innerHTML = html;
    document.getElementById("new-note-modal").close();
    document.getElementById("new-note-form").reset();
  } catch (err) {
    errEl.textContent = err.message || "Failed to save note.";
    errEl.classList.remove("hidden");
  } finally {
    btn.disabled = false;
    btn.textContent = "Save note";
  }
}
</script>
{% endblock %}
