  cefr_level: C1
  frequency_rank: 27
- type: collocation
  text: draw a distinction
  translation: to make a clear difference between two things
  example: It is important to draw a distinction between fact and opinion.
  example_translation: É importante fazer uma distinção entre fato e opinião.
  cefr_level: C1
  frequency_rank: 28
- type: collocation
  text: come to terms with
  translation: to accept a difficult or unpleasant situation
  example: It took him years to come to terms with his diagnosis.
  example_translation: Levou anos para ele aceitar seu diagnóstico.
  cefr_level: C1
  frequency_rank: 29
- type: collocation
  text: bear in mind
  translation: to remember and consider a fact when making a decision
  example: Bear in mind that prices may change without notice.
  example_translation: Tenha em mente que os preços podem mudar sem aviso prévio.
